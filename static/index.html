<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Agent</title>
  <link rel="icon" href="https://render.com/icon.svg" type="image/svg+xml" />
  <script>
    (function(){var t=localStorage.getItem("theme");if(!t)t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";document.documentElement.className=t})();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto:wght@300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --render-purple: #6c63ff;
      --render-purple-hover: #5a52d5;
      --green: #22c55e;
      --red: #ef4444;
      --sidebar-width: 240px;
    }

    html.light {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text: #18181b;
      --text-muted: #52525b;
      --text-dim: #a1a1aa;
      --text-strong: #09090b;
      --overlay-subtle: rgba(0,0,0,0.03);
      --overlay-medium: rgba(0,0,0,0.05);
      --overlay-strong: rgba(0,0,0,0.08);
      --code-bg: rgba(0,0,0,0.04);
      --sep: #e4e4e7;
    }

    html.dark {
      --bg: #0a0a0a;
      --surface: #141416;
      --border: rgba(255,255,255,0.08);
      --text: #e4e4e7;
      --text-muted: #71717a;
      --text-dim: #52525b;
      --text-strong: #fafafa;
      --overlay-subtle: rgba(255,255,255,0.04);
      --overlay-medium: rgba(255,255,255,0.06);
      --overlay-strong: rgba(255,255,255,0.08);
      --code-bg: rgba(255,255,255,0.08);
      --sep: #27272a;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    h1, h2, h3 { font-family: 'Roboto', -apple-system, sans-serif; font-weight: 300; }
    a { color: var(--render-purple); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* --- Header --- */
    header { padding: 0.625rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; background: var(--bg); position: sticky; top: 0; z-index: 10; }
    header .title-group { display: flex; align-items: center; gap: 0.5rem; }
    header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.4); flex-shrink: 0; }
    header h1 { font-size: 0.875rem; font-weight: 600; font-family: 'Inter', sans-serif; color: var(--text-strong); letter-spacing: -0.01em; }
    header .tag { font-size: 0.6rem; padding: 0.125rem 0.4rem; background: var(--overlay-medium); color: var(--text-muted); font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; border: 1px solid var(--border); }
    header .actions { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }
    .header-btn { font-size: 0.725rem; font-weight: 500; padding: 0.3rem 0.6rem; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem; font-family: 'Inter', sans-serif; }
    .header-btn:hover { background: var(--overlay-subtle); color: var(--text); text-decoration: none; }
    .header-btn.primary { background: var(--render-purple); border-color: var(--render-purple); color: #fff; }
    .header-btn.primary:hover { background: var(--render-purple-hover); }
    .header-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

    /* --- Layout --- */
    .layout { flex: 1; display: flex; overflow: hidden; }

    /* --- Sidebar --- */
    #sidebar { width: var(--sidebar-width); flex-shrink: 0; border-right: 1px solid var(--border); background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 0.625rem; border-bottom: 1px solid var(--border); }
    .sidebar-new-btn { width: 100%; padding: 0.5rem 0.625rem; background: var(--overlay-subtle); border: 1px solid var(--border); color: var(--text); font-size: 0.75rem; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 0.375rem; }
    .sidebar-new-btn:hover { background: var(--overlay-strong); }
    .sidebar-new-btn svg { width: 14px; height: 14px; }
    #history-list { flex: 1; overflow-y: auto; padding: 0.375rem; }
    .sidebar-empty { padding: 1rem 0.625rem; font-size: 0.7rem; color: var(--text-dim); text-align: center; }
    .history-item { padding: 0.5rem 0.625rem; font-size: 0.75rem; color: var(--text-muted); cursor: pointer; transition: all 0.15s; display: flex; align-items: flex-start; gap: 0.375rem; position: relative; border: 1px solid transparent; margin-bottom: 1px; }
    .history-item:hover { background: var(--overlay-subtle); border-color: var(--border); }
    .history-item.active { background: var(--overlay-medium); border-color: var(--border); color: var(--text); }
    .history-item .hi-text { flex: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }
    .history-item .hi-time { font-size: 0.6rem; color: var(--text-dim); flex-shrink: 0; margin-top: 0.1rem; }
    .history-item .hi-delete { position: absolute; top: 0.35rem; right: 0.35rem; width: 18px; height: 18px; background: var(--overlay-medium); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; font-size: 0.65rem; display: none; align-items: center; justify-content: center; transition: all 0.15s; }
    .history-item:hover .hi-delete { display: flex; }
    .history-item .hi-delete:hover { color: var(--red); border-color: var(--red); }

    /* --- Content --- */
    .content-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    #main { flex: 1; overflow-y: auto; padding: 2rem 1.25rem; display: flex; flex-direction: column; align-items: center; }

    /* --- Welcome --- */
    .welcome { text-align: center; color: var(--text-dim); margin: auto; padding: 2rem; max-width: 560px; }
    .welcome h2 { font-size: 1.25rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .welcome p { font-size: 0.8rem; line-height: 1.65; }
    .welcome .examples { display: flex; flex-wrap: wrap; gap: 0.375rem; justify-content: center; margin-top: 1rem; }
    .welcome .examples button { padding: 0.4rem 0.75rem; background: var(--overlay-subtle); border: 1px solid var(--border); color: var(--text-muted); font-size: 0.75rem; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s; }
    .welcome .examples button:hover { background: var(--overlay-strong); border-color: var(--overlay-strong); color: var(--text); }

    /* --- Thread container --- */
    #thread { display: none; width: 100%; max-width: 720px; }

    /* --- Entry block (one per Q&A in a thread) --- */
    .entry-block { margin-bottom: 1.5rem; animation: fadeUp 0.3s ease-out; }
    .entry-block + .entry-block { padding-top: 1.5rem; border-top: 1px solid var(--border); }

    .entry-question { font-size: 1.1rem; color: var(--text-strong); font-weight: 500; font-family: 'Inter', sans-serif; margin-bottom: 1rem; }
    .entry-question .activity-timer { font-size: 0.7rem; color: var(--text-dim); font-variant-numeric: tabular-nums; float: right; margin-top: 0.2rem; }

    /* --- Activity feed --- */
    .activity-feed { display: flex; flex-direction: column; gap: 0; }
    .activity-item { display: flex; align-items: flex-start; gap: 0.625rem; padding: 0.5rem 0; font-size: 0.8rem; color: var(--text-muted); animation: fadeUp 0.3s ease-out; border-left: 2px solid var(--border); padding-left: 0.875rem; margin-left: 3px; }
    .activity-item:last-child { border-left-color: transparent; }
    .activity-item .indicator { width: 10px; height: 10px; flex-shrink: 0; margin-top: 0.2rem; margin-left: -1.45rem; border-radius: 50%; background: var(--border); position: relative; }
    .activity-item.active .indicator { background: var(--render-purple); box-shadow: 0 0 8px rgba(108,99,255,0.5); animation: pulse 1.5s ease-in-out infinite; }
    .activity-item.done .indicator { background: var(--green); }
    .activity-item.error .indicator { background: var(--red); }
    .activity-item .label { flex: 1; line-height: 1.5; }
    .activity-item .label strong { color: var(--text); font-weight: 600; }
    .activity-item.done .label { color: var(--text-dim); }
    .activity-item.active .label { color: var(--text); }
    .activity-item .elapsed { font-size: 0.7rem; color: var(--text-dim); font-variant-numeric: tabular-nums; flex-shrink: 0; margin-top: 0.15rem; }
    .subtopic-list { display: flex; flex-wrap: wrap; gap: 0.375rem; margin-top: 0.375rem; }
    .subtopic-tag { font-size: 0.7rem; padding: 0.2rem 0.5rem; background: var(--overlay-subtle); border: 1px solid var(--border); color: var(--text-muted); }
    .activity-error { color: var(--red); font-size: 0.8rem; margin-top: 0.75rem; }
    .dashboard-link { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.7rem; font-weight: 500; color: var(--render-purple); padding: 0.3rem 0.6rem; border: 1px solid rgba(108,99,255,0.25); background: rgba(108,99,255,0.06); transition: all 0.15s; margin-top: 0.75rem; }
    .dashboard-link:hover { background: rgba(108,99,255,0.12); border-color: rgba(108,99,255,0.4); text-decoration: none; }
    .dashboard-link svg { width: 12px; height: 12px; }

    /* --- Direct answer --- */
    .direct-answer { background: var(--surface); border: 1px solid var(--border); padding: 1.25rem 1.5rem; margin-top: 1rem; animation: fadeUp 0.3s ease-out; font-size: 0.9rem; line-height: 1.7; color: var(--text); }

    /* --- Report --- */
    .report-card { background: var(--surface); border: 1px solid var(--border); padding: 2rem; margin-top: 1rem; animation: fadeUp 0.3s ease-out; }
    .report-card h2 { font-size: 1.3rem; color: var(--text-strong); margin-bottom: 0.75rem; font-weight: 400; }
    .report-card .report-summary { font-size: 0.9rem; line-height: 1.7; color: var(--text-muted); padding-bottom: 1rem; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
    .report-card .report-section { margin-bottom: 1.25rem; }
    .report-card .report-section h3 { font-size: 1rem; color: var(--text); font-weight: 500; font-family: 'Inter', sans-serif; margin-bottom: 0.5rem; }
    .report-card .report-section .content { font-size: 0.85rem; line-height: 1.7; color: var(--text); }
    .report-card .report-section .content p { margin: 0.4rem 0; }
    .report-card .report-section .content p:first-child { margin-top: 0; }
    .report-card .report-section .content ul, .report-card .report-section .content ol { margin: 0.4rem 0; padding-left: 1.25rem; }
    .report-card .report-section .content li { margin: 0.15rem 0; }
    .report-card .report-section .content strong { color: var(--text-strong); font-weight: 600; }
    .report-card .report-section .content code { background: var(--code-bg); padding: 0.1rem 0.35rem; font-size: 0.8rem; font-family: "SF Mono", "Fira Code", monospace; }
    .report-card .report-section .content pre { background: var(--code-bg); border: 1px solid var(--border); padding: 0.625rem 0.75rem; margin: 0.5rem 0; overflow-x: auto; font-size: 0.8rem; }
    .report-card .report-section .content pre code { background: none; padding: 0; }
    .report-card .report-sources { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .report-card .report-sources h3 { font-size: 0.8rem; color: var(--text-dim); font-weight: 600; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.5rem; }
    .report-card .report-sources ul { list-style: none; padding: 0; }
    .report-card .report-sources li { font-size: 0.8rem; padding: 0.35rem 0; border-bottom: 1px solid var(--overlay-subtle); }
    .report-card .report-sources li:last-child { border-bottom: none; }
    .report-card .report-sources a { font-weight: 500; }
    .report-card .report-sources .source-url { font-size: 0.7rem; color: var(--text-dim); display: block; margin-top: 0.1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* --- Feedback --- */
    .feedback-bar { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; }
    .feedback-bar span { font-size: 0.75rem; color: var(--text-dim); }
    .feedback-btn { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; background: var(--overlay-subtle); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; transition: all 0.15s; border-radius: 0; }
    .feedback-btn:hover { background: var(--overlay-strong); color: var(--text); }
    .feedback-btn.selected { border-color: var(--render-purple); color: var(--render-purple); background: rgba(108,99,255,0.1); }
    .feedback-btn:disabled { opacity: 0.5; cursor: default; }
    .feedback-btn svg { width: 16px; height: 16px; }
    .feedback-thanks { font-size: 0.75rem; color: var(--green); animation: fadeUp 0.2s ease-out; }

    /* --- Form --- */
    form { padding: 0.75rem 1rem 1rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem; background: var(--bg); }
    input { flex: 1; padding: 0.625rem 0.875rem; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 0.875rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s; }
    input:focus { border-color: var(--render-purple); }
    input::placeholder { color: #3f3f46; }
    button[type="submit"] { padding: 0.625rem 1rem; background: var(--render-purple); color: #fff; border: 1px solid var(--render-purple); font-size: 0.85rem; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 0.375rem; }
    button[type="submit"]:hover { background: var(--render-purple-hover); }
    button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; }
    button[type="submit"] svg { width: 14px; height: 14px; }

    /* --- Footer --- */
    footer { padding: 0.5rem 1.25rem; padding-left: calc(var(--sidebar-width) + 1.25rem); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 0.375rem; font-size: 0.675rem; color: var(--text-dim); background: var(--bg); }
    footer a { color: var(--text-muted); }
    footer a:hover { color: var(--text); }
    footer .sep { color: var(--sep); }

    /* --- Scrollbar --- */
    #main::-webkit-scrollbar, #history-list::-webkit-scrollbar { width: 4px; }
    #main::-webkit-scrollbar-thumb, #history-list::-webkit-scrollbar-thumb { background: var(--overlay-strong); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 4px rgba(108,99,255,0.3); } 50% { box-shadow: 0 0 10px rgba(108,99,255,0.6); } }

    /* --- Mobile --- */
    #sidebar-toggle { display: none; }
    @media (max-width: 600px) {
      #sidebar { position: fixed; top: 0; left: 0; bottom: 0; z-index: 20; transform: translateX(-100%); transition: transform 0.2s ease; }
      #sidebar.open { transform: translateX(0); }
      #sidebar-toggle { display: inline-flex; }
      #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 15; }
      #sidebar-overlay.open { display: block; }
      #main { padding: 1.5rem 0.75rem; }
      form { padding: 0.625rem 0.75rem 0.875rem; }
      header { flex-wrap: wrap; gap: 0.5rem; }
      header .actions { gap: 0.375rem; }
      .header-btn { font-size: 0.65rem; padding: 0.25rem 0.5rem; }
      .header-btn .btn-label { display: none; }
      .report-card { padding: 1.25rem; }
      .entry-question { font-size: 0.95rem; }
      footer { padding-left: 1.25rem; }
    }
  </style>
</head>
<body>
  <header>
    <button id="sidebar-toggle" class="header-btn" title="History">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="title-group">
      <div class="dot"></div>
      <h1>Research Agent</h1>
      <span class="tag">Built on Render</span>
    </div>
    <div class="actions">
      <a id="deploy-btn" href="" target="_blank" rel="noopener">
        <img src="https://render.com/images/deploy-to-render-button.svg" alt="Deploy to Render" style="height:28px;vertical-align:middle" />
      </a>
      <button id="theme-toggle" class="header-btn" title="Toggle theme">
        <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </header>

  <div class="layout">
    <aside id="sidebar">
      <div class="sidebar-header">
        <button class="sidebar-new-btn" onclick="startNewThread()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New research
        </button>
      </div>
      <div id="history-list">
        <div class="sidebar-empty">No history yet</div>
      </div>
    </aside>
    <div id="sidebar-overlay"></div>

    <div class="content-wrapper">
      <div id="main">
        <div class="welcome" id="welcome">
          <h2>Research anything</h2>
          <p>Ask a question. The agent breaks it into subtopics, runs parallel searches, and synthesizes a structured report: powered by <a href="https://render.com/workflows" target="_blank" rel="noopener">Render Workflows</a>.</p>
          <div class="examples">
            <button type="button" onclick="sendExample(this)">What are the latest advances in quantum computing?</button>
            <button type="button" onclick="sendExample(this)">How does mRNA vaccine technology work?</button>
            <button type="button" onclick="sendExample(this)">What is the state of fusion energy in 2026?</button>
          </div>
        </div>

        <div id="thread"></div>
      </div>

      <form id="form">
        <input id="input" type="text" placeholder="What do you want to research?" autocomplete="off" />
        <button type="submit">
          Research
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </form>
    </div>
  </div>

  <footer>
    <span>Built with</span>
    <a href="https://www.langchain.com/langgraph" target="_blank" rel="noopener">LangGraph</a>
    <span class="sep">&middot;</span>
    <a href="https://exa.ai/" target="_blank" rel="noopener">Exa</a>
    <span class="sep">&middot;</span>
    <a href="https://www.anthropic.com/" target="_blank" rel="noopener">Claude</a>
    <span class="sep">&middot;</span>
    <a id="render-link" href="" target="_blank" rel="noopener">Render</a>
    <span class="sep">&middot;</span>
    <a id="github-link" href="" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script>
    // -----------------------------------------------------------------------
    // Theme
    // -----------------------------------------------------------------------
    function toggleTheme() {
      const html = document.documentElement;
      const next = html.classList.contains("dark") ? "light" : "dark";
      html.className = next;
      localStorage.setItem("theme", next);
      updateThemeIcons(next);
    }

    function updateThemeIcons(theme) {
      document.getElementById("icon-sun").style.display = theme === "dark" ? "none" : "block";
      document.getElementById("icon-moon").style.display = theme === "dark" ? "block" : "none";
    }

    // -----------------------------------------------------------------------
    // Config + link setup
    // -----------------------------------------------------------------------
    const GITHUB_REPO = "https://github.com/ojusave/langchain-test";

    function renderSignupUrlWithUtms(content = "footer_link") {
      const params = new URLSearchParams({
        utm_source: "github", utm_medium: "referral",
        utm_campaign: "ojus_demos", utm_content: content,
      });
      return `https://render.com/register?${params.toString()}`;
    }

    document.getElementById("deploy-btn").href = `https://render.com/deploy?repo=${encodeURIComponent(GITHUB_REPO)}`;
    document.getElementById("render-link").href = renderSignupUrlWithUtms("footer_link");
    document.getElementById("github-link").href = GITHUB_REPO;
    document.getElementById("theme-toggle").addEventListener("click", toggleTheme);
    updateThemeIcons(document.documentElement.classList.contains("dark") ? "dark" : "light");

    // -----------------------------------------------------------------------
    // DOM refs
    // -----------------------------------------------------------------------
    const form = document.getElementById("form");
    const inputEl = document.getElementById("input");
    const mainEl = document.getElementById("main");
    const welcome = document.getElementById("welcome");
    const threadEl = document.getElementById("thread");
    const sidebar = document.getElementById("sidebar");
    const historyList = document.getElementById("history-list");
    const sidebarOverlay = document.getElementById("sidebar-overlay");

    let currentThreadId = null;
    let currentRunId = null;
    let timerInterval = null;
    let startTime = 0;

    // Per-entry live state (reset each query)
    let liveBlock = null;
    let liveFeed = null;
    let liveTimer = null;
    let liveError = null;
    let classifyItem = null;
    let planningItem = null;
    let agentItems = {};
    let synthesizingItem = null;

    // -----------------------------------------------------------------------
    // Sidebar: mobile toggle
    // -----------------------------------------------------------------------
    document.getElementById("sidebar-toggle").addEventListener("click", () => {
      sidebar.classList.toggle("open");
      sidebarOverlay.classList.toggle("open");
    });
    sidebarOverlay.addEventListener("click", () => {
      sidebar.classList.remove("open");
      sidebarOverlay.classList.remove("open");
    });

    // -----------------------------------------------------------------------
    // Sidebar: threads
    // -----------------------------------------------------------------------
    function formatRelativeTime(isoString) {
      const diff = Date.now() - new Date(isoString).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "now";
      if (mins < 60) return `${mins}m`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h`;
      return `${Math.floor(hours / 24)}d`;
    }

    async function loadHistory() {
      try {
        const res = await fetch("/history");
        const threads = await res.json();
        if (!Array.isArray(threads) || threads.length === 0) {
          historyList.innerHTML = '<div class="sidebar-empty">No history yet</div>';
          return;
        }
        historyList.innerHTML = "";
        for (const t of threads) {
          const item = document.createElement("div");
          item.className = "history-item" + (t.id === currentThreadId ? " active" : "");
          item.dataset.id = t.id;
          item.innerHTML =
            `<span class="hi-text">${escapeHtml(t.title)}</span>` +
            `<span class="hi-time">${formatRelativeTime(t.updated_at)}</span>` +
            `<button class="hi-delete" onclick="event.stopPropagation(); deleteThread('${t.id}')" title="Delete">&times;</button>`;
          item.addEventListener("click", () => loadThread(t.id));
          historyList.appendChild(item);
        }
      } catch (e) {
        historyList.innerHTML = '<div class="sidebar-empty">No history yet</div>';
      }
    }

    async function loadThread(threadId) {
      try {
        const res = await fetch(`/history/${threadId}`);
        if (!res.ok) return;
        const thread = await res.json();

        currentThreadId = threadId;
        currentRunId = null;
        stopTimer();

        welcome.style.display = "none";
        threadEl.style.display = "block";
        threadEl.innerHTML = "";

        for (const entry of thread.entries) {
          const block = createEntryBlock(entry.question);
          if (entry.report && entry.report.reply && !entry.report.sections) {
            const answerEl = document.createElement("div");
            answerEl.className = "direct-answer";
            answerEl.innerHTML = renderMarkdown(entry.report.reply);
            block.appendChild(answerEl);
          } else {
            block.appendChild(buildReportHtml(entry.report, entry.run_id));
          }
          threadEl.appendChild(block);
          currentRunId = entry.run_id || null;
        }

        highlightSidebar(threadId);
        updateInputPlaceholder();
        sidebar.classList.remove("open");
        sidebarOverlay.classList.remove("open");
        mainEl.scrollTop = mainEl.scrollHeight;
      } catch (e) {}
    }

    async function deleteThread(threadId) {
      try { await fetch(`/history/${threadId}`, { method: "DELETE" }); } catch (e) {}
      if (currentThreadId === threadId) startNewThread();
      loadHistory();
    }

    function startNewThread() {
      currentThreadId = null;
      currentRunId = null;
      stopTimer();
      threadEl.style.display = "none";
      threadEl.innerHTML = "";
      welcome.style.display = "";
      highlightSidebar(null);
      sidebar.classList.remove("open");
      sidebarOverlay.classList.remove("open");
      updateInputPlaceholder();
      inputEl.focus();
    }

    function highlightSidebar(threadId) {
      document.querySelectorAll(".history-item").forEach(el => {
        el.classList.toggle("active", el.dataset.id === threadId);
      });
    }

    // -----------------------------------------------------------------------
    // Entry block builder
    // -----------------------------------------------------------------------
    function createEntryBlock(question) {
      const block = document.createElement("div");
      block.className = "entry-block";
      const q = document.createElement("div");
      q.className = "entry-question";
      q.textContent = question;
      block.appendChild(q);
      return block;
    }

    function createLiveEntryBlock(question) {
      const block = createEntryBlock(question);

      const timer = document.createElement("span");
      timer.className = "activity-timer";
      timer.textContent = "0:00";
      block.querySelector(".entry-question").prepend(timer);

      const feed = document.createElement("div");
      feed.className = "activity-feed";
      block.appendChild(feed);

      const dashLink = document.createElement("a");
      dashLink.href = "https://dashboard.render.com/";
      dashLink.target = "_blank";
      dashLink.rel = "noopener";
      dashLink.className = "dashboard-link";
      dashLink.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Watch tasks in the Render Dashboard';
      block.appendChild(dashLink);

      const errorEl = document.createElement("div");
      errorEl.className = "activity-error";
      block.appendChild(errorEl);

      return { block, feed, timer, errorEl };
    }

    // -----------------------------------------------------------------------
    // Timer
    // -----------------------------------------------------------------------
    function formatElapsed(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function startTimer() {
      startTime = Date.now();
      if (liveTimer) liveTimer.textContent = "0:00";
      timerInterval = setInterval(() => {
        if (liveTimer) liveTimer.textContent = formatElapsed(Math.floor((Date.now() - startTime) / 1000));
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    // -----------------------------------------------------------------------
    // Activity feed helpers
    // -----------------------------------------------------------------------
    function addActivityItem(label, state) {
      const item = document.createElement("div");
      item.className = `activity-item ${state}`;
      item.innerHTML = `<span class="indicator"></span><span class="label">${label}</span>`;
      if (liveFeed) liveFeed.appendChild(item);
      mainEl.scrollTop = mainEl.scrollHeight;
      return item;
    }

    function markItemDone(item) { item.classList.remove("active"); item.classList.add("done"); }
    function markItemError(item) { item.classList.remove("active"); item.classList.add("error"); }

    // -----------------------------------------------------------------------
    // SSE event handlers
    // -----------------------------------------------------------------------
    function handleStatus(data) {
      if (data.phase === "classifying") {
        classifyItem = addActivityItem(
          "<strong>Render Workflows</strong> dispatched classify task: <strong>Claude</strong> is analyzing your query...", "active"
        );
      } else if (data.phase === "planning") {
        planningItem = addActivityItem(
          "<strong>Render Workflows</strong> dispatched the plan task: <strong>Claude</strong> is breaking down your question...", "active"
        );
      } else if (data.phase === "synthesizing") {
        synthesizingItem = addActivityItem("<strong>Claude</strong> is synthesizing the final report...", "active");
      }
    }

    function handleClassified(data) {
      if (classifyItem) markItemDone(classifyItem);
      const label = data.type === "research"
        ? "<strong>Claude</strong> classified this as a research query"
        : "<strong>Claude</strong> classified this as a direct question";
      addActivityItem(label, "done");
    }

    function handleDirectAnswer(data) {
      stopTimer();
      currentRunId = data.run_id || null;
      if (data.thread_id) currentThreadId = data.thread_id;

      const tools = data.tools || [];
      if (tools.includes("LangSmith")) {
        addActivityItem("<strong>LangSmith</strong> traced all calls in this pipeline", "done");
      }

      setTimeout(() => {
        if (liveBlock) {
          const answerEl = document.createElement("div");
          answerEl.className = "direct-answer";
          answerEl.innerHTML = renderMarkdown(data.reply || "");
          liveBlock.appendChild(answerEl);
          mainEl.scrollTop = mainEl.scrollHeight;
        }
        loadHistory();
        highlightSidebar(currentThreadId);
        updateInputPlaceholder();
      }, 300);
    }

    function handlePlan(data) {
      if (planningItem) markItemDone(planningItem);
      const subtopics = data.subtopics || [];
      let tagsHtml = '<div class="subtopic-list">';
      for (const st of subtopics) tagsHtml += `<span class="subtopic-tag">${escapeHtml(st)}</span>`;
      tagsHtml += '</div>';
      addActivityItem(`<strong>Claude</strong> planned ${subtopics.length} subtopics` + tagsHtml, "done");
      addActivityItem(`<strong>Render Workflows</strong> launched ${subtopics.length} parallel agents`, "done");
    }

    function handleAgentStart(data) {
      const item = addActivityItem(
        `<strong>LangGraph</strong> agent is using <strong>Exa</strong> to research: ${escapeHtml(data.subtopic)}`, "active"
      );
      agentItems[data.index] = { item, startTime: Date.now() };
    }

    function handleAgentDone(data) {
      const entry = agentItems[data.index];
      if (!entry) return;
      markItemDone(entry.item);
      const elapsed = Math.round((Date.now() - entry.startTime) / 1000);
      const elapsedSpan = document.createElement("span");
      elapsedSpan.className = "elapsed";
      elapsedSpan.textContent = `${elapsed}s`;
      entry.item.appendChild(elapsedSpan);
      entry.item.querySelector(".label").innerHTML = `<strong>LangGraph</strong> agent finished: ${escapeHtml(data.subtopic)}`;
    }

    function updateInputPlaceholder() {
      inputEl.placeholder = currentThreadId
        ? "Ask a follow-up question..."
        : "What do you want to research?";
    }

    function handleDone(data) {
      if (synthesizingItem) markItemDone(synthesizingItem);
      stopTimer();
      currentRunId = data.run_id || null;
      if (data.thread_id) currentThreadId = data.thread_id;

      const tools = data.tools || [];
      if (tools.includes("LangSmith")) {
        addActivityItem("<strong>LangSmith</strong> traced all calls in this pipeline", "done");
      }

      setTimeout(() => {
        if (liveBlock) {
          const reportCard = buildReportHtml(data.report, data.run_id);
          liveBlock.appendChild(reportCard);
          mainEl.scrollTop = mainEl.scrollHeight;
        }
        loadHistory();
        highlightSidebar(currentThreadId);
        updateInputPlaceholder();
      }, 300);
    }

    function handleError(data) {
      stopTimer();
      if (classifyItem && classifyItem.classList.contains("active")) markItemError(classifyItem);
      if (planningItem) markItemError(planningItem);
      if (synthesizingItem) markItemError(synthesizingItem);
      for (const key of Object.keys(agentItems)) {
        const e = agentItems[key];
        if (e.item.classList.contains("active")) markItemError(e.item);
      }
      if (liveError) liveError.textContent = data.message || "Unknown error";
    }

    // -----------------------------------------------------------------------
    // Report builder
    // -----------------------------------------------------------------------
    function renderMarkdown(text) {
      let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`);
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      const lines = html.split("\n"), blocks = [];
      let listBuffer = [], inList = false;
      for (const line of lines) {
        const m = line.match(/^[\s]*[-•]\s+(.*)/);
        if (m) { inList = true; listBuffer.push(`<li>${m[1]}</li>`); }
        else {
          if (inList) { blocks.push(`<ul>${listBuffer.join("")}</ul>`); listBuffer = []; inList = false; }
          const t = line.trim();
          if (t.startsWith("<pre>")) blocks.push(t);
          else if (t) blocks.push(`<p>${t}</p>`);
        }
      }
      if (inList) blocks.push(`<ul>${listBuffer.join("")}</ul>`);
      return blocks.join("");
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function buildReportHtml(data, runId) {
      const card = document.createElement("div");
      card.className = "report-card";
      let html = "";
      if (data.title) html += `<h2>${escapeHtml(data.title)}</h2>`;
      if (data.summary) html += `<div class="report-summary">${escapeHtml(data.summary)}</div>`;
      if (data.sections) {
        for (const s of data.sections) {
          html += `<div class="report-section">`;
          if (s.heading) html += `<h3>${escapeHtml(s.heading)}</h3>`;
          if (s.content) html += `<div class="content">${renderMarkdown(s.content)}</div>`;
          html += `</div>`;
        }
      }
      if (data.sources && data.sources.length > 0) {
        html += `<div class="report-sources"><h3>Sources</h3><ul>`;
        for (const src of data.sources) {
          const title = escapeHtml(src.title || src.url || "Source");
          const url = src.url || "#";
          html += `<li><a href="${url}" target="_blank" rel="noopener">${title}</a>`;
          if (src.url) html += `<span class="source-url">${escapeHtml(src.url)}</span>`;
          html += `</li>`;
        }
        html += `</ul></div>`;
      }
      if (runId) {
        const fbId = "fb-" + runId;
        html += `<div class="feedback-bar" id="${fbId}"><span>Was this helpful?</span>`;
        html += `<button class="feedback-btn" onclick="sendFeedback('${runId}', 1, this)" title="Helpful"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg></button>`;
        html += `<button class="feedback-btn" onclick="sendFeedback('${runId}', 0, this)" title="Not helpful"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0122 4v7a2.31 2.31 0 01-2.33 2H17"/></svg></button>`;
        html += `</div>`;
      }
      card.innerHTML = html;
      return card;
    }

    // -----------------------------------------------------------------------
    // Feedback
    // -----------------------------------------------------------------------
    async function sendFeedback(runId, score, btn) {
      const bar = btn.closest(".feedback-bar");
      if (!bar) return;
      bar.querySelectorAll(".feedback-btn").forEach(b => { b.disabled = true; b.classList.remove("selected"); });
      btn.classList.add("selected");
      try {
        await fetch("/feedback", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ run_id: runId, score }) });
      } catch (e) {}
      const thanks = document.createElement("span");
      thanks.className = "feedback-thanks";
      thanks.textContent = "Thanks for your feedback";
      bar.appendChild(thanks);
    }

    // -----------------------------------------------------------------------
    // SSE parser
    // -----------------------------------------------------------------------
    function parseSSE(text) {
      const events = [], parts = text.split("\n\n");
      const remainder = parts.pop();
      for (const part of parts) {
        if (!part.trim()) continue;
        let event = "message", data = "";
        for (const line of part.split("\n")) {
          if (line.startsWith("event: ")) event = line.slice(7);
          else if (line.startsWith("data: ")) data = line.slice(6);
        }
        if (data) { try { events.push({ event, data: JSON.parse(data) }); } catch (e) {} }
      }
      return { events, remainder: remainder || "" };
    }

    // -----------------------------------------------------------------------
    // Form submit
    // -----------------------------------------------------------------------
    function sendExample(btn) {
      inputEl.value = btn.textContent;
      form.dispatchEvent(new Event("submit"));
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";

      welcome.style.display = "none";
      threadEl.style.display = "block";

      // Reset per-entry live state
      classifyItem = null;
      planningItem = null;
      agentItems = {};
      synthesizingItem = null;

      const { block, feed, timer, errorEl } = createLiveEntryBlock(text);
      liveBlock = block;
      liveFeed = feed;
      liveTimer = timer;
      liveError = errorEl;
      threadEl.appendChild(block);
      mainEl.scrollTop = mainEl.scrollHeight;
      startTimer();

      const submitBtn = form.querySelector("button[type='submit']");
      submitBtn.disabled = true;

      try {
        const body = { question: text };
        if (currentThreadId) body.thread_id = currentThreadId;

        const res = await fetch("/research", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const { events, remainder } = parseSSE(buffer);
          buffer = remainder;
          for (const { event, data } of events) {
            if (event === "status") handleStatus(data);
            else if (event === "classified") handleClassified(data);
            else if (event === "direct_answer") handleDirectAnswer(data);
            else if (event === "plan") handlePlan(data);
            else if (event === "agent_start") handleAgentStart(data);
            else if (event === "agent_done") handleAgentDone(data);
            else if (event === "done") handleDone(data);
            else if (event === "error") handleError(data);
          }
        }
      } catch (err) {
        handleError({ message: err.message });
      } finally {
        submitBtn.disabled = false;
        inputEl.focus();
      }
    });

    // -----------------------------------------------------------------------
    // Init
    // -----------------------------------------------------------------------
    loadHistory();
    inputEl.focus();
  </script>
</body>
