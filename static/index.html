<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain Chat</title>
  <link rel="icon" href="https://render.com/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto:wght@300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --render-purple: #6c63ff;
      --render-purple-hover: #5a52d5;
      --bg: #0a0a0a;
      --surface: #141416;
      --border: rgba(255,255,255,0.08);
      --text: #e4e4e7;
      --text-muted: #71717a;
      --text-dim: #52525b;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    h1, h2, h3 {
      font-family: 'Roboto', -apple-system, sans-serif;
      font-weight: 300;
    }

    a { color: var(--render-purple); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Header */
    header {
      padding: 0.625rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header .title-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34,197,94,0.4);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 0.875rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: #fafafa;
      letter-spacing: -0.01em;
    }

    header .tag {
      font-size: 0.6rem;
      padding: 0.125rem 0.4rem;
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      border: 1px solid var(--border);
    }

    header .actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-btn {
      font-size: 0.725rem;
      font-weight: 500;
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-family: 'Inter', sans-serif;
    }

    .header-btn:hover {
      background: rgba(255,255,255,0.04);
      color: var(--text);
      text-decoration: none;
    }

    .header-btn.primary {
      background: var(--render-purple);
      border-color: var(--render-purple);
      color: #fff;
    }

    .header-btn.primary:hover {
      background: var(--render-purple-hover);
    }

    .header-btn svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    /* Chat */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
      max-width: min(75%, 560px);
      animation: fadeUp 0.2s ease-out;
    }

    .msg-group.user { align-self: flex-end; }
    .msg-group.assistant { align-self: flex-start; }

    .msg-label {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-dim);
      padding: 0 0.25rem;
      margin-bottom: 0.125rem;
      margin-top: 0.75rem;
    }

    .msg-group.user .msg-label { text-align: right; }

    .msg {
      padding: 0.625rem 0.875rem;
      line-height: 1.55;
      font-size: 0.875rem;
      word-wrap: break-word;
      overflow-wrap: break-word;
      border: 1px solid var(--border);
    }

    .msg.user {
      background: var(--render-purple);
      border-color: var(--render-purple);
      color: #fff;
    }

    .msg.assistant {
      background: var(--surface);
    }

    .msg.assistant.thinking { color: var(--text-dim); }

    .msg.assistant.thinking::after {
      content: "";
      display: inline-block;
      width: 4px;
      height: 14px;
      background: var(--text-dim);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    .msg.assistant strong { color: #fafafa; font-weight: 600; }
    .msg.assistant p { margin: 0.35rem 0; }
    .msg.assistant p:first-child { margin-top: 0; }
    .msg.assistant p:last-child { margin-bottom: 0; }

    .msg.assistant ul, .msg.assistant ol {
      margin: 0.35rem 0;
      padding-left: 1.25rem;
    }

    .msg.assistant li { margin: 0.15rem 0; }

    .msg.assistant code {
      background: rgba(255,255,255,0.08);
      padding: 0.1rem 0.35rem;
      font-size: 0.8rem;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .msg.assistant pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      padding: 0.625rem 0.75rem;
      margin: 0.5rem 0;
      overflow-x: auto;
      font-size: 0.8rem;
    }

    .msg.assistant pre code { background: none; padding: 0; }

    /* Welcome */
    .welcome {
      align-self: center;
      text-align: center;
      color: var(--text-dim);
      margin: auto;
      padding: 2rem;
    }

    .welcome h2 {
      font-size: 1.25rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .welcome p {
      font-size: 0.8rem;
      line-height: 1.65;
    }

    .welcome .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      justify-content: center;
      margin-top: 1rem;
    }

    .welcome .examples button {
      padding: 0.4rem 0.75rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: #a1a1aa;
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }

    .welcome .examples button:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.12);
      color: var(--text);
    }

    /* Input */
    form {
      padding: 0.75rem 1rem 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      background: var(--bg);
    }

    input {
      flex: 1;
      padding: 0.625rem 0.875rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.875rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--render-purple); }
    input::placeholder { color: #3f3f46; }

    button[type="submit"] {
      padding: 0.625rem 1rem;
      background: var(--render-purple);
      color: #fff;
      border: 1px solid var(--render-purple);
      font-size: 0.85rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }

    button[type="submit"]:hover { background: var(--render-purple-hover); }
    button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; }

    button[type="submit"] svg { width: 14px; height: 14px; }

    /* Footer */
    footer {
      padding: 0.5rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      font-size: 0.675rem;
      color: var(--text-dim);
      background: var(--bg);
    }

    footer a { color: var(--text-muted); }
    footer a:hover { color: var(--text); }
    footer .sep { color: #27272a; }

    /* Scrollbar */
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }
    #chat::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink { 50% { opacity: 0; } }

    @media (max-width: 600px) {
      .msg-group { max-width: 88%; }
      #chat { padding: 1rem 0.75rem; }
      form { padding: 0.625rem 0.75rem 0.875rem; }
      header { flex-wrap: wrap; gap: 0.5rem; }
      header .actions { gap: 0.375rem; }
      .header-btn { font-size: 0.65rem; padding: 0.25rem 0.5rem; }
      .header-btn .btn-label { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="title-group">
      <div class="dot"></div>
      <h1>LangChain Chat</h1>
      <span class="tag">Claude Sonnet + Tools</span>
    </div>
    <div class="actions">
      <a href="https://github.com/ojusave/langchain-test" target="_blank" rel="noopener" class="header-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        <span class="btn-label">GitHub</span>
      </a>
      <a id="deploy-btn" href="" target="_blank" rel="noopener" class="header-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="7.5 4.21 12 6.81 16.5 4.21"/><polyline points="7.5 19.79 7.5 14.6 3 12"/><polyline points="21 12 16.5 14.6 16.5 19.79"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <span class="btn-label">Deploy</span>
      </a>
      <a id="signup-btn" href="" target="_blank" rel="noopener" class="header-btn primary">
        <span class="btn-label">Sign up on Render</span>
      </a>
    </div>
  </header>

  <div id="chat">
    <div class="welcome">
      <h2>Ask me anything</h2>
      <p>I can search the web and do math.</p>
      <div class="examples">
        <button type="button" onclick="sendExample(this)">What is the population of Tokyo?</button>
        <button type="button" onclick="sendExample(this)">Latest news on AI agents</button>
        <button type="button" onclick="sendExample(this)">What's 1729^2?</button>
      </div>
    </div>
  </div>

  <form id="form">
    <input id="input" type="text" placeholder="Type a message..." autocomplete="off" />
    <button type="submit">
      Send
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </form>

  <footer>
    <span>Built with LangChain + Claude</span>
    <span class="sep">·</span>
    <a href="https://render.com/" target="_blank" rel="noopener">Powered by Render</a>
    <span class="sep">·</span>
    <a href="https://github.com/ojusave/langchain-test" target="_blank" rel="noopener">Source</a>
  </footer>

  <script>
    const GITHUB_REPO = "https://github.com/ojusave/langchain-test";

    function renderSignupUrlWithUtms(content = "footer_link") {
      const params = new URLSearchParams({
        utm_source: "github",
        utm_medium: "referral",
        utm_campaign: "ojus_demos",
        utm_content: content,
      });
      return `https://render.com/register?${params.toString()}`;
    }

    function deployToRenderUrl() {
      return `https://render.com/deploy?repo=${encodeURIComponent(GITHUB_REPO)}`;
    }

    document.getElementById("signup-btn").href = renderSignupUrlWithUtms("navbar_button");
    document.getElementById("deploy-btn").href = deployToRenderUrl();

    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    let history = [];

    function renderMarkdown(text) {
      let html = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${code.trim()}</code></pre>`
      );
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");

      const lines = html.split("\n");
      const blocks = [];
      let listBuffer = [];
      let inList = false;

      for (const line of lines) {
        const listMatch = line.match(/^[\s]*[-•]\s+(.*)/);
        if (listMatch) {
          inList = true;
          listBuffer.push(`<li>${listMatch[1]}</li>`);
        } else {
          if (inList) {
            blocks.push(`<ul>${listBuffer.join("")}</ul>`);
            listBuffer = [];
            inList = false;
          }
          const trimmed = line.trim();
          if (trimmed.startsWith("<pre>")) {
            blocks.push(trimmed);
          } else if (trimmed) {
            blocks.push(`<p>${trimmed}</p>`);
          }
        }
      }
      if (inList) blocks.push(`<ul>${listBuffer.join("")}</ul>`);

      return blocks.join("");
    }

    function addMessage(role, content, cls = "") {
      const welcome = chat.querySelector(".welcome");
      if (welcome) welcome.remove();

      const group = document.createElement("div");
      group.className = `msg-group ${role}`;

      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = role === "user" ? "You" : "Assistant";
      group.appendChild(label);

      const div = document.createElement("div");
      div.className = `msg ${role} ${cls}`.trim();

      if (role === "assistant" && !cls.includes("thinking")) {
        div.innerHTML = renderMarkdown(content);
      } else {
        div.textContent = content;
      }

      group.appendChild(div);
      chat.appendChild(group);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function sendExample(btn) {
      input.value = btn.textContent;
      form.dispatchEvent(new Event("submit"));
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      addMessage("user", text);

      const thinking = addMessage("assistant", "Thinking", "thinking");
      const btn = form.querySelector("button[type='submit']");
      btn.disabled = true;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, history }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Request failed");
        }

        const data = await res.json();
        thinking.innerHTML = renderMarkdown(data.reply);
        thinking.classList.remove("thinking");

        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: data.reply });

        if (history.length > 20) history = history.slice(-20);
      } catch (err) {
        thinking.textContent = "Error: " + err.message;
        thinking.classList.remove("thinking");
      } finally {
        btn.disabled = false;
        input.focus();
      }
    });

    input.focus();
  </script>
</body>
</html>
