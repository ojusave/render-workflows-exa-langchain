services:
  - type: web
    name: langchain-example
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        displayName: Anthropic API Key
        description: "Required: your Anthropic API key (starts with sk-ant-). Get one at https://console.anthropic.com/"
        required: true
        sensitive: true
      - key: PYTHON_VERSION
        value: "3.12.3"
