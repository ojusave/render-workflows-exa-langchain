services:
  - type: web
    name: research-agent
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: RENDER_API_KEY
        displayName: Render API Key
        description: "Required: your Render API key for triggering workflow tasks. Get one at https://render.com/docs/api#1-create-an-api-key"
        required: true
        sensitive: true
        sync: false
      - key: WORKFLOW_SLUG
        displayName: Workflow Slug
        description: "The slug of the workflow service (defaults to research-agent-workflow)"
        required: false
        sync: false
      - key: LANGCHAIN_API_KEY
        displayName: LangSmith API Key
        description: "Optional: enables tracing and feedback via LangSmith"
        required: false
        sensitive: true
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_PROJECT
        value: "research-agent"
      - key: DATABASE_URL
        displayName: PostgreSQL Connection URL
        description: "Optional: enables research history sidebar. Create a Render PostgreSQL database and use its Internal URL."
        required: false
        sensitive: true
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.3"
